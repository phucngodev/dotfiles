live_config_reload: true
window:
  position:
    x: 130
    y: 80
  dimensions:
    columns: 180
    lines: 38
  padding:
    x: 0
    y: 0

  dynamic_padding: true
  decorations: full
  title: ""

font:
  normal:
    family: "Consolas Nerd Font"
  size: 15
  offset:
    x: 0
    y: 5

selection:
  save_to_clipboard: true

custom_cursor_colors: true

colors:
  primary:
    background: "0x32302f"
    foreground: "0xd4be98"
  normal:
    black: "0x45403d"
    red: "0xea6962"
    green: "0xa9b665"
    yellow: "0xd8a657"
    blue: "0x7daea3"
    magenta: "0xd3869b"
    cyan: "0x89b482"
    white: "0xd4be98"
  bright:
    black: "0x45403d"
    red: "0xea6962"
    green: "0xa9b665"
    yellow: "0xd8a657"
    blue: "0x7daea3"
    magenta: "0xd3869b"
    cyan: "0x89b482"
    white: "0xd4be98"

working_directory: /Users/phuc/Projects/

scrolling:
  history: 10000

key_bindings:
  - { key: Return, mods: Alt, action: ToggleFullScreen }
shell:
  program: /bin/bash
  args:
    - -l
    - -c
    - tux attach || tmux
