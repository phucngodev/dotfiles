live_config_reload = true
working_directory = "/Users/phuc/Projects/"
# Default colors
[colors.primary]
background = '#2d353b'
foreground = '#d3c6aa'

# Normal colors
[colors.normal]
black   = '#475258'
red     = '#e67e80'
green   = '#a7c080'
yellow  = '#dbbc7f'
blue    = '#7fbbb3'
magenta = '#d699b6'
cyan    = '#83c092'
white   = '#d3c6aa'

# Bright colors
[colors.bright]
black   = '#475258'
red     = '#e67e80'
green   = '#a7c080'
yellow  = '#dbbc7f'
blue    = '#7fbbb3'
magenta = '#d699b6'
cyan    = '#83c092'
white   = '#d3c6aa'

[colors.cursor]
text = "0xbe7e05"
cursor = "0xF9A825"

[font]
size = 18

[font.normal]
family = "Consolas Nerd Font"

[font.offset]
x = 1
y = 8

[font.glyph_offset]
x = 1
y = 4

[[keyboard.bindings]]
action = "ToggleMaximized"
key = "Return"
mods = "Alt"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[shell]
args = ["-l", "-c", "tmux attach || tmux"]
program = "/bin/bash"

[window]
# startup_mode = "Maximized"
# decorations_theme_variant = "dark"
dynamic_padding = true
resize_increments = true
title = ""

[window.padding]
x = 0
y = 0

[window.position]
x = 700
y = 150

[window.dimensions]
columns = 135
lines = 39

