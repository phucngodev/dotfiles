live_config_reload = true
working_directory = "/Users/phuc/Projects/"

[colors.primary]
background = '#fdf6e3'
foreground = '#5c6a72'

[colors.normal]
black      = '#5c6a72'
red        = '#f85552'
green      = '#8da101'
yellow     = '#dfa000'
blue       = '#3a94c5'
magenta    = '#df69ba'
cyan       = '#35a77c'
white      = '#e0dcc7'

[colors.bright]
black      = '#5c6a72'
red        = '#f85552'
green      = '#8da101'
yellow     = '#dfa000'
blue       = '#3a94c5'
magenta    = '#df69ba'
cyan       = '#35a77c'
white      = '#e0dcc7'

[colors.cursor]
text = "0xbe7e05"
cursor = "0xF9A825"

[font]
size = 18

[font.normal]
family = "Consolas Nerd Font"

[font.offset]
x = 1
y = 8

[font.glyph_offset]
x = 1
y = 4

[[keyboard.bindings]]
action = "ToggleMaximized"
key = "Return"
mods = "Alt"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[shell]
args = ["-l", "-c", "tmux attach || tmux"]
program = "/bin/bash"

[window]
# startup_mode = "Maximized"
# decorations_theme_variant = "dark"
dynamic_padding = true
resize_increments = true
title = ""

[window.padding]
x = 0
y = 0

[window.position]
x = 700
y = 150

[window.dimensions]
columns = 135
lines = 39

