live_config_reload = true
working_directory = "/Users/phuc/Projects/"

[colors.bright]
black = "0x4b505b"
blue = "0x5079be"
cyan = "0x3a8b84"
green = "0x608e32"
magenta = "0xb05ccc"
red = "0xd05858"
