live_config_reload = true
working_directory = "/Volumes/Data/Projects/"

[colors.primary]
background = '#282828'
foreground = '#dfbf8e'

[colors.normal]
black   = '#665c54'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#e78a4e'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#dfbf8e'

[colors.bright]
black   = '#928374'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#e3a84e'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#dfbf8e'

[colors.cursor]
text = "0xbe7e05"
cursor = "0xbe7e05"

[font]
size = 17

[font.normal]
family = "JetBrainsMonoNL Nerd Font"

[font.offset]
x = 0
y = 7

[font.glyph_offset]
x = 0
y = 4

[[keyboard.bindings]]
action = "ToggleMaximized"
key = "Return"
mods = "Alt"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[shell]
args = ["-l", "-c", "tmux attach || tmux"]
program = "/bin/bash"

[window]
# startup_mode = "Maximized"
decorations = "full"
dynamic_padding = true
title = ""
resize_increments = true

[window.position]
x = 400
y = 170

[window.dimensions]
columns = 160
lines = 37

