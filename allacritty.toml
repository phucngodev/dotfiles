[font]
size = 19

[font.normal]
family = "GoMono Nerd Font"

[font.offset]
x = 0
y = 4

[font.glyph_offset]
x = 0
y = 2

[[keyboard.bindings]]
action = "ToggleMaximized"
key = "Return"
mods = "Alt"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[shell]
args = ["-l", "-c", "tux attach || tmux"]
program = "/bin/bash"

[window]
# startup_mode = "Maximized"
decorations = "full"
dynamic_padding = true
title = ""
resize_increments = true

[window.position]
x = 500
y = 200

[window.dimensions]
columns = 190
lines = 54

